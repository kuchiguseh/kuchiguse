<!DOCTYPE html>
<!-- deploy: 2026-03-25 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口ぐせセラピスト AI コーチ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1207;
    --paper: #faf6ef;
    --warm: #c8a96e;
    --accent: #8b4513;
    --soft: #e8dcc8;
    --muted: #7a6a52;
    --bubble-user: #3d2b1a;
    --bubble-ai: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--paper);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(200,169,110,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,69,19,0.06) 0%, transparent 50%);
  }

  .header {
    padding: 16px 24px;
    border-bottom: 1px solid rgba(200,169,110,0.3);
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(250,246,239,0.95);
    backdrop-filter: blur(10px);
    position: relative;
    z-index: 10;
  }

  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--warm), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(139,69,19,0.2);
  }

  .header-info h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: 17px; font-weight: 600;
    color: var(--ink); letter-spacing: 0.05em;
  }

  .header-info p { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #5cb85c; display: inline-block;
    margin-right: 5px; animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
  }

  .chat-area {
    flex: 1; overflow-y: auto; padding: 24px 20px;
    display: flex; flex-direction: column;
    gap: 18px; scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--soft); border-radius: 2px; }

  .message {
    display: flex; gap: 10px;
    animation: fadeUp 0.3s ease; max-width: 85%;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  .message.ai   { align-self: flex-start; }

  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; margin-top: 2px;
  }

  .ai   .msg-avatar { background: linear-gradient(135deg, var(--warm), var(--accent)); box-shadow: 0 2px 6px rgba(139,69,19,0.15); }
  .user .msg-avatar { background: var(--bubble-user); }

  .bubble {
    padding: 12px 16px; border-radius: 18px;
    line-height: 1.7; font-size: 14px; position: relative;
  }

  .ai .bubble {
    background: white; color: var(--ink);
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    border: 1px solid rgba(200,169,110,0.15);
  }

  .user .bubble {
    background: var(--bubble-user); color: #f5ead8;
    border-bottom-right-radius: 4px;
  }

  .bubble strong { color: var(--accent); font-weight: 700; }
  .user .bubble strong { color: var(--warm); }

  .typing-bubble {
    background: white; border: 1px solid rgba(200,169,110,0.15);
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    padding: 14px 18px; border-radius: 18px;
    border-bottom-left-radius: 4px;
    display: flex; gap: 5px; align-items: center;
  }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--warm); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%            { transform: translateY(-6px); opacity: 1; }
  }

  .suggestions {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 0 20px 12px;
  }

  .suggestion-btn {
    background: white; border: 1px solid rgba(200,169,110,0.4);
    border-radius: 20px; padding: 7px 14px;
    font-size: 12px; font-family: 'Zen Kaku Gothic New', sans-serif;
    color: var(--muted); cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }

  .suggestion-btn:hover { background: var(--soft); border-color: var(--warm); color: var(--accent); }

  .input-area {
    padding: 12px 16px 20px;
    background: rgba(250,246,239,0.98);
    border-top: 1px solid rgba(200,169,110,0.2);
  }

  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
    background: white; border: 1.5px solid rgba(200,169,110,0.35);
    border-radius: 24px; padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }

  .input-row:focus-within { border-color: var(--warm); box-shadow: 0 2px 16px rgba(200,169,110,0.15); }

  textarea {
    flex: 1; border: none; outline: none; background: transparent;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px; color: var(--ink); resize: none;
    line-height: 1.5; max-height: 100px; min-height: 24px;
  }

  textarea::placeholder { color: #bbb; }

  .send-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--warm), var(--accent));
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(139,69,19,0.25);
  }

  .send-btn:hover  { transform: scale(1.05); box-shadow: 0 4px 12px rgba(139,69,19,0.35); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 16px; height: 16px; fill: white; }

  .welcome-badge {
    display: inline-block;
    background: linear-gradient(135deg, rgba(200,169,110,0.15), rgba(139,69,19,0.1));
    border: 1px solid rgba(200,169,110,0.3); border-radius: 20px;
    padding: 4px 12px; font-size: 11px; color: var(--accent);
    margin-bottom: 8px; font-weight: 700; letter-spacing: 0.05em;
  }

  .error-msg {
    color: #c0392b; font-size: 13px; padding: 10px 14px;
    background: #fdf0ef; border-radius: 10px; border: 1px solid #f5c6c6;
  }

  .knowledge-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(92,184,92,0.1); border: 1px solid rgba(92,184,92,0.3);
    border-radius: 12px; padding: 2px 10px; font-size: 10px;
    color: #3a7a3a; margin-left: 8px; font-weight: 700;
  }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">🌸</div>
  <div class="header-info">
    <h1>口ぐせセラピスト AIコーチ <span class="knowledge-badge">📰 メルマガ学習済</span></h1>
    <p><span class="status-dot"></span>30年の人事経験 × 5000人以上の指導実績 × 大石ゆうじのメルマガ知識</p>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="message ai">
    <div class="msg-avatar">🌸</div>
    <div class="bubble">
      <div class="welcome-badge">✨ 口ぐせセラピスト</div><br>
      こんにちは！口ぐせセラピストの大石ゆうじです 😊<br><br>
      突然ですが、こんな言葉、よく言っていませんか？<br>
      <strong>「でも…」「どうせ…」「忙しい…」「私なんて…」</strong><br><br>
      実は、その言葉が毎日の気分や人生を知らず知らずのうちに作っているんです。<br><br>
      まずは気軽に話しかけてみてください。<br>あなたの口ぐせ、一緒に見つけましょう！ 🌸
    </div>
  </div>
</div>

<div class="suggestions" id="suggestions">
  <button class="suggestion-btn" onclick="sendSuggestion(this)">自分の口ぐせって何だろう？</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">「でも」「どうせ」をよく言ってしまう</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">口ぐせって何ですか？</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">「忙しい」が口ぐせになってる</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">自己肯定感を高めたい</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">大石さんってどんな人？</button>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="userInput" placeholder="悩みや質問を入力してください…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `あなたは「口ぐせセラピスト」大石ゆうじ本人のAIコーチです。温かく、具体的に、ユーザーの口ぐせに寄り添ってください。

【大石ゆうじ プロフィール】
・兵庫県伊丹市出身、57歳、東京世田谷区在住。妻と愛うさぎと暮らす
・人事経験30年、人事コンサルタント20年（300社以上・5000人以上の管理職育成）
・2021年独立、2022年「口ぐせセラピスト」として活動開始
・ミッション：「口ぐせの言葉の力で大丈夫な世界を作る」
・著書「未来口ぐせ」出版（50代からの言葉の力）

【口ぐせとは】
習慣的に使っている言葉・フレーズのこと。声に出す言葉、ひとり言、文字（日記・LINEなど）として現れるものすべてを含む。

【口ぐせセラピストの核心理論】
口ぐせは「今の心の状態を映す鏡」。習慣的に使っている言葉が現実をつくっている。言葉を変えることで、思考・感情・行動・現実が変わっていく。

【口ぐせ分類】全5種
・ポジ系：前向き・肯定的な言葉
・ヒゲ系：言葉のつなぎや間を埋める言葉
・ネガ系：否定的・消極的な言葉
・ロジカル系：思考を整理・深掘りするための言葉
・口撃系：相手を攻撃・支配・同調圧力にかける言葉

【ユーザーへの対応指針】
・ユーザーの口ぐせを否定せず、まずその言葉の背景にある気持ちを受け止める
・フラットに、押しつけず、温かく寄り添う
・一度に多くを変えようとせず、まず一つの言葉から始めることを勧める
・返答は300文字程度にまとめ、読みやすく改行を入れる`;

const history = [];

async function sendMessage() {
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text || sendBtn.disabled) return;

  document.getElementById('suggestions').style.display = 'none';
  addMessage('user', text);
  input.value = '';
  autoResize(input);
  sendBtn.disabled = true;
  const typingId = showTyping();
  history.push({ role: 'user', content: text });

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);

    const response = await fetch('https://kuchiguse-api.makeabetter0917world.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 512,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    clearTimeout(timeout);
    removeTyping(typingId);

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const reply = data.content?.[0]?.text || '（返答を取得できませんでした）';
    history.push({ role: 'assistant', content: reply });
    addMessage('ai', reply);

  } catch (e) {
    removeTyping(typingId);
    addMessage('ai', `エラーが発生しました。\n${e.message}`, true);
    history.pop();
  }

  sendBtn.disabled = false;
  input.focus();
}

function sendSuggestion(btn) {
  const input = document.getElementById('userInput');
  input.value = btn.textContent;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function addMessage(role, text, isError = false) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatarEmoji = role === 'ai' ? '🌸' : '👤';
  const bubbleContent = isError
    ? `<div class="error-msg">${text.replace(/\n/g, '<br>')}</div>`
    : `<div class="bubble">${formatText(text)}</div>`;
  div.innerHTML = `<div class="msg-avatar">${avatarEmoji}</div>${bubbleContent}`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const chatArea = document.getElementById('chatArea');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = id;
  div.innerHTML = `<div class="msg-avatar">🌸</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}
</script>
</body>
</html>
