・温かく、親しみやすい語り口（「〜なんですよ！」「笑」をよく使う）
・具体例を出してから哲学を語る（帰納法的）
・質問で相手の内省を促す（「あなたは今、どんな言葉を使っていますか？」）

【応答のルール】
1. 必ず大石ゆうじ本人として話す（一人称：「私」）
2. 温かく、親しみやすく。初めてこのテーマに触れる人にも優しく
3. 【重要】専門用語は一切使わない。「詰まる口ぐせ」「流れる口ぐせ」「しょうがない」「在り方」「言霊」などは最初から出さない
4. 【重要】回答は2文程度で。できる限り短く。スマホで読みやすい分量に。1割でも短くできるなら短くする
5. 【重要】毎回かならず相手への質問1つで終わる（例：「ちなみに、どんな時によく言いますか？」）
6. 置き換え提案は1つだけ。「〇〇」を「△△」に変えてみる、というシンプルな形で
7. 初心者向けの日常的な口ぐせ例だけ使う：「でも」「どうせ」「忙しい」「疲れた」「私なんて」など

const PROMO_HTML_5 = `<div style="line-height:2;">📧 <a href="https://resast.jp/subscribe/255889" target="_blank" style="color:#c0396e;">無料メルマガ（毎日配信中）</a><br>💬 <a href="https://lin.ee/k5eFib6" target="_blank" style="color:#c0396e;">公式LINE</a></div>`;

const PROMO_HTML_7 = `<div style="line-height:2;">🎤 <a href="https://www.reservestock.jp/page/event_series/115338" target="_blank" style="color:#c0396e;">口ぐせセミナー（毎週水・土 朝10時〜）</a></div>`;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function resetChat() {
  conversationHistory = [];
  document.getElementById('messages').innerHTML = `
    <div class="message ai">
      <div class="avatar ai">🌸</div>
      <div class="bubble ai">こんにちは！口ぐせセラピストの大石ゆうじです 😊

function sendSuggestion(text) {
  document.getElementById('userInput').value = text;

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  document.getElementById('suggestions').style.display = 'none';

  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  const typingEl = appendTyping();

  try {
    const response = await fetch('https://kuchiguse-api.makeabetter0917world.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    typingEl.remove();

    const reply = data.content?.[0]?.text || '少し考えさせてください…もう一度話しかけてみてください 🌸';
    appendMessage('ai', reply);
    conversationHistory.push({ role: 'assistant', content: reply });
    messageCount++;
    if (messageCount === 5) {
      setTimeout(() => appendHtmlMessage('ai', PROMO_HTML_5), 800);
    } else if (messageCount === 7) {
      setTimeout(() => appendHtmlMessage('ai', PROMO_HTML_7), 800);
    } else if ([10, 15, 20, 25].includes(messageCount)) {
      const promos = [PROMO_HTML_5, PROMO_HTML_7];
      const random = promos[Math.floor(Math.random() * promos.length)];
      setTimeout(() => appendHtmlMessage('ai', random), 800);
    }

  } catch (err) {
    typingEl.remove();
    appendMessage('ai', 'ごめんなさい、少し繋がりにくい状況です。もう一度試してみてください 🌸');
  }

  sendBtn.disabled = false;
  input.focus();
}

function appendMessage(role, text) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/「(.*?)」/g, '「<strong>$1</strong>」');

  div.innerHTML = `
    <div class="avatar ${role}">${role === 'ai' ? '🌸' : '😊'}</div>
    <div class="bubble ${role}">${formatted}</div>`;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function appendHtmlMessage(role, html) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="avatar ${role}">🌸</div>
    <div class="bubble ${role}">${html}</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function appendTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.innerHTML = `
    <div class="avatar ai">🌸</div>
    <div class="bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}
