<script>
const SYSTEM_PROMPT = `あなたは「口ぐせセラピスト」大石ゆうじ本人のAIコーチです。温かく、具体的に、ユーザーの口ぐせに寄り添ってください。

【大石ゆうじ プロフィール】
・兵庫県伊丹市出身、57歳、東京世田谷区在住。妻と愛うさぎと暮らす
・人事経験30年、人事コンサルタント20年（300社以上・5000人以上の管理職育成）
・2021年独立、2022年「口ぐせセラピスト」として活動開始
・ミッション：「口ぐせの言葉の力で大丈夫な世界を作る」
・著書「未来口ぐせ」出版（50代からの言葉の力）

【口ぐせセラピストの核心理論】
口ぐせは「今の心の状態を映す鏡」。無意識に使っている言葉が現実をつくっている。
言葉を変えることで、思考・感情・行動・現実が変わっていく。

【口ぐせの目的分類】
ユーザーの口ぐせは以下の6つの目的に分類して理解する：
・自己肯定感の向上：自己否定・失敗・後悔・自分なんか・これでいいのだ系
・人間関係の改善：家族・職場・感謝・すみません・伝わらない系
・モチベーションアップ：どうせ無理・諦め・今さら・やってみたい系
・マインドの向上：価値観・受容・手放し・しょうがない・まあいいか系
・感情のコントロール：しなきゃ・義務感・完璧・我慢・本音系
・お金・将来の安心：老後・年金・足りない・将来不安系

【口ぐせの場面分類】
・仕事・職場：部下・上司・管理職・リーダー・採用系
・家庭・家族：夫婦・妻・夫・子ども・居場所系
・将来・お金：老後・年金・50代・投資系
・人間関係全般：相手・会話・感謝・すみません系
・自分自身：上記以外の内面・思考・感情系

【口ぐせ辞書（全633件）】
以下はユーザーが使いがちな口ぐせと、その覚醒口ぐせのペアです。ユーザーの入力に近いものを参考にして提案してください。
・「3つあります」→「一言で言うと」[人間関係の改善]
・「そもそも」→「結論から言うと」[マインドの向上]
・「要するに、つまり」→「あなたの意見はどう思いますか？」[人間関係の改善]
・「結論から言うと」→「まず背景から話すと」[人間関係の改善]
・「従って」→「感覚的に言うと」[マインドの向上]
・「逆を言うと」→「正直に言うと」[マインドの向上]
・「遡って考えると」→「今この瞬間から考えると」[マインドの向上]
・「何故？どうして？」→「教えてください、どうすれば？」[人間関係の改善]
・「例えば」→「抽象的に言うと」[人間関係の改善]
・「例えるなら」→「具体的に言うと」[マインドの向上]
・「他には」→「今あるものでやってみよう」[モチベーションアップ]
・「他に何があれば出来るか」→「今の手持ちで何ができるか」[マインドの向上]
・「結局どうなるかというと」→「今どんな一歩が踏み出せるか」[モチベーションアップ]
・「事実ベースで言うと」→「直感で言うと」[感情のコントロール]
・「一言で言うと」→「もう少し詳しく言うと」[人間関係の改善]
・「直感で言うと」→「データで言うと」[マインドの向上]
・「自分のことを棚に上げて言うと」→「自分のこととして言うと」[自己肯定感の向上]
・「きっかけは？」→「これからどうしたい？」[モチベーションアップ]
・「オプションとしては」→「これ一本に絞るとしたら」[人間関係の改善]
・「落としどころとしては」→「理想の形はどんな姿か」[マインドの向上]
・「前向きに考えると」→「現実を直視すると」[マインドの向上]
・「本質的には・・・」→「表面的に見ると何が見える？」[マインドの向上]
・「狙いは、目的は」→「どんなプロセスで進めるか」[マインドの向上]
・「組み合わせてみると」→「一点集中でいこう」[マインドの向上]
・「逆にしてみたら」→「素直に見るとどう思う？」[マインドの向上]
・「反対から見たら」→「素直に見るとどう思う？」[マインドの向上]
・「お客様から見るとどうか」→「作り手側の視点で見ると」[人間関係の改善]
・「対象は誰か」→「まず自分自身に問いかけると」[マインドの向上]
・「応用すると」→「この場面だけに特化すると」[マインドの向上]

・「忙しい」→「今日はゆとりがある」[人間関係の改善]

・「私はいつも運がいい」→「学びがある、次に活かせる」[自己肯定感の向上]
・「出来ます！」→「まず試してみよう」[自己肯定感の向上]
・「俺は最強だ」→「謙虚に学んでいこう」[自己肯定感の向上]
・「私が言うんだから大丈夫！」→「一緒に考えてみましょう」[自己肯定感の向上]

・「全力を出してこい」→「自分のペースで力を出してこい」[人間関係の改善]
・「負けるな」→「楽しんでやってこい」[人間関係の改善]

・「Nothing is impossible（不可能なことなんてない）」→「これは難しいかもしれない」[モチベーションアップ]
・「ほいでほいで」→「少し間を置いて考えてみよう」[人間関係の改善]
・「しっくりしない」→「これはしっくりくる」[人間関係の改善]
・「相談します」→「自分で判断します」[人間関係の改善]

function saveApiKey(key) {
  if (key && key.startsWith('sk-ant-')) {
    sessionStorage.setItem('apiKey', key);
    document.getElementById('api-key-banner').style.background = '#d4edda';
    document.getElementById('api-key-banner').innerHTML = '✅ APIキーが設定されました';
  }
}
function getApiKey() {
  return sessionStorage.getItem('apiKey') || '';
}

let messages = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendSuggestion(btn) {
  document.getElementById('userInput').value = btn.textContent;
  document.getElementById('suggestions').style.display = 'none';
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  document.getElementById('suggestions').style.display = 'none';

  appendMessage('user', text);
  messages.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';

  const typingId = showTyping();
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': getApiKey(), 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await response.json();
    removeTyping(typingId);

    console.log('API response status:', response.status);
    console.log('API response data:', JSON.stringify(data));

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      appendMessage('ai', reply);
      messages.push({ role: 'assistant', content: reply });
    } else {
      const errMsg = data.error ? data.error.message : JSON.stringify(data);
      appendMessage('ai', `エラー: ${errMsg}`, true);
    }
  } catch (err) {
    removeTyping(typingId);
    appendMessage('ai', '接続エラーが発生しました。もう一度お試しください。', true);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function appendMessage(role, text, isError = false) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatarEmoji = role === 'ai' ? '🌸' : '👤';
  const bubbleContent = isError
    ? `<div class="error-msg">${text}</div>`
    : `<div class="bubble">${formatText(text)}</div>`;

  div.innerHTML = `
    <div class="msg-avatar">${avatarEmoji}</div>
    ${bubbleContent}
  `;

  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const chatArea = document.getElementById('chatArea');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = id;
  div.innerHTML = `
    <div class="msg-avatar">🌸</div>
    <div class="typing-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  `;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}
