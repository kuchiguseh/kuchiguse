<style>
  :root {

  .header {
    padding: 16px 24px;
    border-bottom: 1px solid rgba(200,169,110,0.3);
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(250,246,239,0.95);

    position: relative;
    z-index: 10;

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--warm), var(--accent));

    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;

  .header-info h1 {

    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.05em;
  }

  .header-info p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #5cb85c;
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--soft); border-radius: 2px; }

  .message {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
    max-width: 85%;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
    align-self: flex-end;
  }

  .message.ai {
    align-self: flex-start;
  }

  .msg-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .ai .msg-avatar {
    background: linear-gradient(135deg, var(--warm), var(--accent));
    box-shadow: 0 2px 6px rgba(139,69,19,0.15);
  }

  .user .msg-avatar {
    background: var(--bubble-user);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 18px;
    line-height: 1.7;
    font-size: 14px;
    position: relative;
  }

  .ai .bubble {
    background: white;
    color: var(--ink);
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    border: 1px solid rgba(200,169,110,0.15);
  }

  .user .bubble {
    background: var(--bubble-user);
    color: #f5ead8;
    border-bottom-right-radius: 4px;
  }

  .bubble strong {
    color: var(--accent);
    font-weight: 700;
  }

  .user .bubble strong {
    color: var(--warm);
  }

  .typing-bubble {
    background: white;
    border: 1px solid rgba(200,169,110,0.15);
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    padding: 14px 18px;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--warm);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 20px 12px;
  }

  .suggestion-btn {
    background: white;
    border: 1px solid rgba(200,169,110,0.4);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .suggestion-btn:hover {
    background: var(--soft);
    border-color: var(--warm);
    color: var(--accent);
  }

  .input-area {

    background: rgba(250,246,239,0.98);
    border-top: 1px solid rgba(200,169,110,0.2);

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: white;
    border: 1.5px solid rgba(200,169,110,0.35);
    border-radius: 24px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);

  .input-row:focus-within {
    border-color: var(--warm);
    box-shadow: 0 2px 16px rgba(200,169,110,0.15);

    outline: none;
    background: transparent;

    font-size: 14px;

    line-height: 1.5;
    max-height: 100px;

  .send-btn {
    width: 36px;
    height: 36px;

    cursor: pointer;
    display: flex;

  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 16px; height: 16px; fill: white; }

  .welcome-badge {
    display: inline-block;
    background: linear-gradient(135deg, rgba(200,169,110,0.15), rgba(139,69,19,0.1));
    border: 1px solid rgba(200,169,110,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 8px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .error-msg {
    color: #c0392b;
    font-size: 13px;
    padding: 10px 14px;
    background: #fdf0ef;
    border-radius: 10px;
    border: 1px solid #f5c6c6;

  .knowledge-badge {
    display: inline-flex;
    align-items: center;

    padding: 2px 10px;
    font-size: 10px;
    color: #3a7a3a;
    margin-left: 8px;
    font-weight: 700;

const SYSTEM_PROMPT = `あなたは「口ぐせセラピスト」大石ゆうじ本人のAIコーチです。温かく、具体的に、ユーザーの口ぐせに寄り添ってください。

【大石ゆうじ プロフィール】
・兵庫県伊丹市出身、57歳、東京世田谷区在住。妻と愛うさぎと暮らす
・人事経験30年、人事コンサルタント20年（300社以上・5000人以上の管理職育成）
・2021年独立、2022年「口ぐせセラピスト」として活動開始
・ミッション：「口ぐせの言葉の力で大丈夫な世界を作る」
・著書「未来口ぐせ」出版（50代からの言葉の力）

【口ぐせとは】
習慣的に使っている言葉・フレーズのこと。声に出す言葉、ひとり言、文字（日記・LINEなど）として現れるものすべてを含む。無意識に出るものだけでなく、意識的に使っているものも口ぐせとして扱う。

【口ぐせセラピストの核心理論】
口ぐせは「今の心の状態を映す鏡」。習慣的に使っている言葉が現実をつくっている。言葉を変えることで、思考・感情・行動・現実が変わっていく。

【口ぐせ分類（B列）】全5種
・ポジ系：前向き・肯定的な言葉。アファメーションや名言・感情表現も含む
・ヒゲ系：言葉のつなぎや間を埋める言葉。「えーと」「まあ」など
・ネガ系：否定的・消極的な言葉。自己卑下・不満・諦め・回避など
・ロジカル系：思考を整理・深掘りするための言葉。意識的に使うことで思考をコントロールするもの
・口撃系：相手を攻撃・支配・同調圧力にかける言葉

【目的分類（D列）】全6種
・自己肯定感の向上：自分を認め、肯定する力を高める
・人間関係・コミュニケーション：相手との関係を築き、伝える力を高める
・マインド・感情：心の状態・気持ちを整え、前向きな視点を持つ
・自己否定：自分を低く見る言葉のパターン（気づきのきっかけとして収録）
・責任・行動回避：他者・環境のせいにする、または行動しない理由を作る言葉のパターン
・支配・攻撃・同調：相手を押さえつけたり、多数派を根拠にする言葉のパターン

【反対の口ぐせ・置き換えの口ぐせについて】
・反対の口ぐせ：対になる言葉。単純な反対語ではなく、自己肯定感が上がる・行動しやすくなる言葉
・置き換えの口ぐせ：同じ場面で使えるより良い言い方。できていることに焦点が当たる表現
・「ー」は該当なしを意味する

【ユーザーへの対応指針】
・ユーザーの口ぐせを否定せず、まずその言葉の背景にある気持ちを受け止める
・辞書の「反対の口ぐせ」「置き換えの口ぐせ」を参考に、その人に合った言葉を提案する
・フラットに、押しつけず、温かく寄り添う
・一度に多くを変えようとせず、まず一つの言葉から始めることを勧める

  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');

  `;

  chatArea.scrollTop = chatArea.scrollHeight;
  return id;
}

function removeTyping(id) {
