<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 口ぐせセラピスト 🌸</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: #fdf6f0;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem;
}
.wrap {
  width: 100%;
  max-width: 640px;
}
.header {
  text-align: center;
  margin-bottom: 2rem;
}
.header h1 {
  font-size: 20px;
  font-weight: 600;
  color: #333;
  margin-bottom: 0.25rem;
}
.header p {
  font-size: 13px;
  color: #888;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 1.75rem 1.5rem;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
}
.progress-bar {
  height: 4px;
  background: #eee;
  border-radius: 2px;
  margin-bottom: 1.5rem;
}
.progress-fill {
  height: 100%;
  background: #7F77DD;
  border-radius: 2px;
  transition: width 0.3s;
}
.q-num {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 0.5rem;
}
.q-text {
  font-size: 17px;
  font-weight: 600;
  color: #222;
  margin-bottom: 1.25rem;
  line-height: 1.6;
}
.choice {
  display: block;
  width: 100%;
  text-align: left;
  padding: 14px 16px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1.5px solid #e5e5e5;
  background: #fafafa;
  color: #333;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  line-height: 1.5;
}
.choice:hover {
  background: #f0effe;
  border-color: #b0aaee;
}
.choice.selected {
  border: 2px solid #7F77DD;
  background: #EEEDFE;
  color: #3C3489;
}
.next-btn {
  margin-top: 1rem;
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #7F77DD;
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  opacity: 0.4;
  pointer-events: none;
  transition: opacity 0.2s;
}
.next-btn.active {
  opacity: 1;
  pointer-events: auto;
}
.next-btn.active:hover {
  background: #6b63cc;
}
.tiebreak-notice {
  font-size: 14px;
  color: #666;
  background: #f7f5ff;
  border-radius: 10px;
  padding: 0.75rem 1rem;
  margin-bottom: 1.25rem;
  line-height: 1.6;
  border-left: 3px solid #7F77DD;
}
.result-header {
  text-align: center;
  margin-bottom: 1.5rem;
}
.result-emoji {
  font-size: 48px;
  margin-bottom: 0.5rem;
}
.type-badge {
  display: inline-block;
  padding: 5px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 0.75rem;
}
.type-D  { background: #FCEBEB; color: #A32D2D; }
.type-I  { background: #FAEEDA; color: #854F0B; }
.type-S  { background: #EAF3DE; color: #3B6D11; }
.type-C  { background: #E6F1FB; color: #185FA5; }
.type-DI,.type-ID { background: #FFF3E0; color: #854F0B; }
.type-DS,.type-SD { background: #FDECEC; color: #A32D2D; }
.type-DC,.type-CD { background: #E8F2FD; color: #185FA5; }
.type-IS,.type-SI { background: #EDF7E4; color: #3B6D11; }
.type-IC,.type-CI { background: #FEF9EC; color: #854F0B; }
.type-SC,.type-CS { background: #E1F5EE; color: #0F6E56; }
.result-title {
  font-size: 20px;
  font-weight: 700;
  color: #222;
  margin-bottom: 0.35rem;
}
.result-sub {
  font-size: 13px;
  color: #888;
  margin-bottom: 1rem;
}
.result-desc {
  font-size: 15px;
  color: #444;
  line-height: 1.8;
  margin-bottom: 1.25rem;
}
.section-label {
  font-size: 12px;
  font-weight: 600;
  color: #999;
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}
.kuchiguse-box {
  background: #f9f9f9;
  border-radius: 10px;
  padding: 1rem;
  margin-bottom: 0.75rem;
}
.kuchiguse-label {
  font-size: 12px;
  color: #999;
  margin-bottom: 0.4rem;
}
.kuchiguse-bad {
  font-size: 15px;
  color: #c0392b;
  font-weight: 600;
  line-height: 1.6;
}
.kuchiguse-good {
  font-size: 15px;
  color: #27ae60;
  font-weight: 600;
  line-height: 1.6;
}
.divider {
  border: none;
  border-top: 1px solid #eee;
  margin: 1.25rem 0;
}
.restart-btn {
  width: 100%;
  padding: 13px;
  border-radius: 10px;
  border: 1.5px solid #ddd;
  background: transparent;
  color: #555;
  font-size: 15px;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: background 0.15s;
}
.restart-btn:hover {
  background: #f5f5f5;
}
.score-row {
  display: flex;
  gap: 8px;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}
.score-chip {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  background: #f0f0f0;
  color: #666;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🌸 口ぐせタイプ診断</h1>
    <p>大石ゆうじの口ぐせセラピー</p>
  </div>
  <div class="card" id="app"></div>
</div>

<script>
const questions = [
  { text: "週末の予定が急に空きました。どうしますか？", choices: [
    { text: "新しいことに挑戦してみる", type: "D" },
    { text: "誰かを誘って出かける", type: "I" },
    { text: "家でのんびり過ごす", type: "S" },
    { text: "部屋の片付けや整理をする", type: "C" }
  ]},
  { text: "新しいカフェがオープンしました。あなたは？", choices: [
    { text: "すぐに行ってみる", type: "D" },
    { text: "SNSでシェアして友達を誘う", type: "I" },
    { text: "人の口コミを聞いてから行く", type: "S" },
    { text: "メニューや評判を調べてから行く", type: "C" }
  ]},
  { text: "友達が落ち込んでいます。あなたの一言は？", choices: [
    { text: "「元気出して！行動すれば変わるよ」", type: "D" },
    { text: "「一緒に楽しいことしよう！」", type: "I" },
    { text: "「無理しなくていいよ、そばにいるから」", type: "S" },
    { text: "「何があったのか詳しく教えて？」", type: "C" }
  ]},
  { text: "家族旅行の計画を立てる時、あなたは？", choices: [
    { text: "行きたい場所をどんどん提案する", type: "D" },
    { text: "みんなが楽しめるアクティビティを探す", type: "I" },
    { text: "全員の予定を優先して日程を決める", type: "S" },
    { text: "宿や交通手段をしっかり比較して決める", type: "C" }
  ]},
  { text: "新しい美容法を知りました。あなたは？", choices: [
    { text: "すぐに試してみる", type: "D" },
    { text: "友達にも紹介して一緒に試す", type: "I" },
    { text: "安全そうか確認してから始める", type: "S" },
    { text: "成分や効果を調べてから実行", type: "C" }
  ]},
  { text: "大事なイベント当日、雨になりました。あなたは？", choices: [
    { text: "「予定変更！別の案でいこう！」", type: "D" },
    { text: "「雨でも楽しめる方法を見つけよう」", type: "I" },
    { text: "「まあ、こんな日もあるよね」", type: "S" },
    { text: "「次は天気予報をもっと見ておこう」", type: "C" }
  ]},
  { text: "お気に入りの服にシミをつけてしまった！", choices: [
    { text: "「すぐに手を打てば大丈夫！」", type: "D" },
    { text: "「これをきっかけに新しい服探そう」", type: "I" },
    { text: "「まあ、時間をかけてケアしよう」", type: "S" },
    { text: "「原因を分析して今後防ごう」", type: "C" }
  ]},
  { text: "友人との約束がキャンセルに。あなたは？", choices: [
    { text: "別の予定を入れて時間を有効活用", type: "D" },
    { text: "他の友達を誘って楽しく過ごす", type: "I" },
    { text: "家でゆっくりしてリフレッシュ", type: "S" },
    { text: "次回の予定を早めに調整しておく", type: "C" }
  ]},
  { text: "プレゼントを贈る時、あなたは？", choices: [
    { text: "相手が驚くようなインパクト重視", type: "D" },
    { text: "会話の中で欲しそうにしていた物を選ぶ", type: "I" },
    { text: "喜んでもらえる無難なものを選ぶ", type: "S" },
    { text: "事前に相手の好みやサイズをリサーチ", type: "C" }
  ]},
  { text: "新しい趣味を始めようと思います。あなたは？", choices: [
    { text: "とにかく体験してみる", type: "D" },
    { text: "仲間を見つけて一緒に始める", type: "I" },
    { text: "生活のリズムに合うか考えてから", type: "S" },
    { text: "必要な道具や費用を調べてから", type: "C" }
  ]}
];

const tieQuestions = {
  "DI": { text: "何かを達成した時、あなたはどちらに近い？", choices: [
    { text: "「やった！次はもっと大きな目標へ」", type: "D" },
    { text: "「みんなで喜びたい！早く報告しよう」", type: "I" }
  ]},
  "DS": { text: "仕事やプロジェクトで大切にしていることは？", choices: [
    { text: "スピードと結果", type: "D" },
    { text: "チームの安定と信頼", type: "S" }
  ]},
  "DC": { text: "決断する時のスタイルは？", choices: [
    { text: "直感で素早く決める", type: "D" },
    { text: "データを集めてから慎重に決める", type: "C" }
  ]},
  "IS": { text: "楽しい時間を過ごすとき、どちらに近い？", choices: [
    { text: "みんなでワイワイしていたい", type: "I" },
    { text: "親しい人と静かに過ごしたい", type: "S" }
  ]},
  "IC": { text: "新しいアイデアが浮かんだ時、あなたは？", choices: [
    { text: "すぐに周りに話して盛り上げたい", type: "I" },
    { text: "まず整理して検証してから共有したい", type: "C" }
  ]},
  "SC": { text: "トラブルが起きた時、まず何をしますか？", choices: [
    { text: "周りを安心させて落ち着かせる", type: "S" },
    { text: "原因を分析して対策を考える", type: "C" }
  ]}
};

const typeInfo = {
  D: {
    name: "Dタイプ（主導型）",
    emoji: "🦁",
    sub: "行動力・決断力・チャレンジ精神",
    desc: "あなたはスピードと結果を大切にする行動派です。困難な状況でも積極的に動き、リーダーシップを発揮します。",
    bad: "「どうせ無理」「やってもしょうがない」「まあいいか」",
    good: "「やってみよう！」「まずは動いてみる」「私ならできる」"
  },
  I: {
    name: "Iタイプ（感化型）",
    emoji: "🌟",
    sub: "明るさ・社交性・表現力・熱意",
    desc: "あなたは人と関わることが大好きで、その場を明るく盛り上げる天才です。コミュニケーション能力が高く、周りを元気にします。",
    bad: "「どうせ誰もわかってくれない」「盛り上がらない」「つまらない」",
    good: "「楽しんでいこう！」「一緒にやろう！」「絶対うまくいく！」"
  },
  S: {
    name: "Sタイプ（安定型）",
    emoji: "🌿",
    sub: "穏やかさ・協調性・誠実さ・継続力",
    desc: "あなたは周りへの気配りと安定感が強みです。チームの調和を大切にし、コツコツと継続する力を持っています。",
    bad: "「でも…」「私なんて…」「迷惑かけたくない」",
    good: "「大丈夫、焦らなくていい」「一歩一歩進めばいい」「みんなで乗り越えよう」"
  },
  C: {
    name: "Cタイプ（慎重型）",
    emoji: "🔍",
    sub: "分析力・几帳面さ・品質重視",
    desc: "あなたは物事を深く考え、正確さと質にこだわる分析派です。データや事実をもとに丁寧に判断し、信頼される存在です。",
    bad: "「もっと調べないと…」「まだ準備が足りない」「失敗したらどうしよう」",
    good: "「準備は十分、あとは実行するだけ」「分析済み、自信を持って進もう」"
  }
};

const combinedInfo = {
  "DI": { name: "D×I 複合タイプ（行動する影響者）", emoji: "🔥", desc: "スピードと熱量を兼ね備えた、強力なリーダータイプです。結果にこだわりながらも人を巻き込む力があります。" },
  "DS": { name: "D×S 複合タイプ（頼れる行動者）", emoji: "💪", desc: "スピーディに動きながらも、周りへの配慮を忘れない頼もしいタイプです。チームを引っ張りながら安定もつくれます。" },
  "DC": { name: "D×C 複合タイプ（戦略的実行者）", emoji: "🎯", desc: "決断力と分析力を両立した、計画的かつ行動力のあるタイプです。緻密に考えてから素早く動く強みがあります。" },
  "IS": { name: "I×S 複合タイプ（温かい調和者）", emoji: "🌸", desc: "明るさと温かさを持つ、誰からも好かれる人望タイプです。人間関係を大切にし、チームに笑顔と安心感をもたらします。" },
  "IC": { name: "I×C 複合タイプ（論理的な表現者）", emoji: "✨", desc: "アイデアと分析力を掛け合わせた、説得力のある伝え手です。楽しく話しながらも根拠のあるコミュニケーションが得意。" },
  "SC": { name: "S×C 複合タイプ（堅実な支援者）", emoji: "🛡️", desc: "誠実さと几帳面さを兼ね備えた、信頼の厚いサポータータイプです。コツコツと丁寧に、周りを支え続けます。" }
};

let scores = { D: 0, I: 0, S: 0, C: 0 };
let currentQ = 0;
let phase = "main";
let selectedChoice = null;
let tieKey = null;

function getTiedTypes() {
  const max = Math.max(scores.D, scores.I, scores.S, scores.C);
  return Object.keys(scores).filter(t => scores[t] === max);
}

function getTieKey(types) {
  return types.slice().sort().join("");
}

function render() {
  const app = document.getElementById("app");
  if (phase === "main") renderMain(app);
  else if (phase === "tiebreak") renderTiebreak(app);
  else if (phase === "result") renderResult(app);
}

function renderMain(app) {
  const q = questions[currentQ];
  const total = questions.length;
  const pct = Math.round((currentQ / total) * 100);
  app.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-num">質問 ${currentQ + 1} / ${total}</div>
    <div class="q-text">${q.text}</div>
    ${q.choices.map((c, i) => `<button class="choice" onclick="selectChoice(${i})">${c.text}</button>`).join("")}
    <button class="next-btn" id="nxt" onclick="nextQ()">${currentQ === questions.length - 1 ? '結果を見る' : '次へ'}</button>
  `;
  selectedChoice = null;
}

function selectChoice(i) {
  selectedChoice = i;
  document.querySelectorAll(".choice").forEach((el, idx) => {
    el.classList.toggle("selected", idx === i);
  });
  const nxt = document.getElementById("nxt");
  nxt.classList.add("active");
  nxt.textContent = currentQ === questions.length - 1 ? "結果を見る" : "次へ";
}

function nextQ() {
  if (selectedChoice === null) return;
  const type = questions[currentQ].choices[selectedChoice].type;
  scores[type]++;
  currentQ++;
  selectedChoice = null;
  if (currentQ >= questions.length) {
    const tied = getTiedTypes();
    if (tied.length === 1) { phase = "result"; render(); return; }
    if (tied.length === 2) {
      const key = getTieKey(tied);
      if (tieQuestions[key]) { tieKey = key; phase = "tiebreak"; render(); return; }
    }
    phase = "result"; render();
  } else {
    render();
  }
}

function renderTiebreak(app) {
  const tq = tieQuestions[tieKey];
  const types = tieKey.split("");
  app.innerHTML = `
    <div class="tiebreak-notice">
      ${types[0]}タイプと${types[1]}タイプが同点です。もう1問だけ答えてください 🌸
    </div>
    <div class="q-text">${tq.text}</div>
    ${tq.choices.map((c, i) => `<button class="choice" onclick="selectTie(${i},'${c.type}')">${c.text}</button>`).join("")}
  `;
}

function selectTie(i, type) {
  document.querySelectorAll(".choice").forEach((el, idx) => {
    el.classList.toggle("selected", idx === i);
  });
  setTimeout(() => {
    scores[type]++;
    phase = "result";
    render();
  }, 400);
}

function renderResult(app) {
  const tied = getTiedTypes();
  let html = "";

  if (tied.length === 1) {
    const t = tied[0];
    const info = typeInfo[t];
    html = `
      <div class="result-header">
        <div class="result-emoji">${info.emoji}</div>
        <div class="type-badge type-${t}">${info.name}</div>
        <div class="result-sub">${info.sub}</div>
      </div>
      <div class="result-desc">${info.desc}</div>
      <hr class="divider">
      <div class="section-label">気をつけたい口ぐせ</div>
      <div class="kuchiguse-box">
        <div class="kuchiguse-bad">${info.bad}</div>
      </div>
      <div class="section-label">意識したいポジティブな口ぐせ</div>
      <div class="kuchiguse-box">
        <div class="kuchiguse-good">${info.good}</div>
      </div>
    `;
  } else {
    const key = getTieKey(tied);
    const combined = combinedInfo[key] || { name: tied.join("×") + " 複合タイプ", emoji: "✨", desc: "複数のタイプの特徴を持つバランス型です。" };
    const t1 = typeInfo[tied[0]];
    const t2 = typeInfo[tied[1]];
    html = `
      <div class="result-header">
        <div class="result-emoji">${combined.emoji}</div>
        <div class="type-badge type-${key}">${combined.name}</div>
      </div>
      <div class="result-desc">${combined.desc}</div>
      <hr class="divider">
      <div class="section-label">気をつけたい口ぐせ</div>
      <div class="kuchiguse-box">
        <div class="kuchiguse-label">${tied[0]}タイプ傾向</div>
        <div class="kuchiguse-bad">${t1.bad}</div>
      </div>
      <div class="kuchiguse-box">
        <div class="kuchiguse-label">${tied[1]}タイプ傾向</div>
        <div class="kuchiguse-bad">${t2.bad}</div>
      </div>
      <div class="section-label" style="margin-top:1rem;">意識したいポジティブな口ぐせ</div>
      <div class="kuchiguse-box">
        <div class="kuchiguse-label">${tied[0]}タイプ傾向</div>
        <div class="kuchiguse-good">${t1.good}</div>
      </div>
      <div class="kuchiguse-box">
        <div class="kuchiguse-label">${tied[1]}タイプ傾向</div>
        <div class="kuchiguse-good">${t2.good}</div>
      </div>
    `;
  }

  html += `
    <hr class="divider">
    <div class="score-row">
      <span class="score-chip">D: ${scores.D}点</span>
      <span class="score-chip">I: ${scores.I}点</span>
      <span class="score-chip">S: ${scores.S}点</span>
      <span class="score-chip">C: ${scores.C}点</span>
    </div>
    <button class="restart-btn" onclick="restart()">🔄 もう一度診断する</button>
  `;
  app.innerHTML = html;
}

function restart() {
  scores = { D: 0, I: 0, S: 0, C: 0 };
  currentQ = 0; phase = "main"; selectedChoice = null; tieKey = null;
  render();
}

render();
</script>
</body>
</html>
