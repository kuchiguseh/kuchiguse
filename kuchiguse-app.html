<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 口ぐせセラピスト 🌸</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: #fdf6f0;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem;
}
.wrap { width: 100%; max-width: 640px; }
.header { text-align: center; margin-bottom: 2rem; }
.header h1 { font-size: 20px; font-weight: 600; color: #333; margin-bottom: 0.25rem; }
.header p { font-size: 13px; color: #888; }
.card { background: #fff; border-radius: 16px; padding: 1.75rem 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }

/* ── 診断画面 ── */
.progress-bar { height: 4px; background: #eee; border-radius: 2px; margin-bottom: 1.5rem; }
.progress-fill { height: 100%; background: #7F77DD; border-radius: 2px; transition: width 0.3s; }
.q-num { font-size: 12px; color: #aaa; margin-bottom: 0.5rem; }
.q-text { font-size: 17px; font-weight: 600; color: #222; margin-bottom: 1.25rem; line-height: 1.6; }
.choice { display: block; width: 100%; text-align: left; padding: 14px 16px; margin-bottom: 10px; border-radius: 10px; border: 1.5px solid #e5e5e5; background: #fafafa; color: #333; font-size: 15px; cursor: pointer; transition: background 0.15s, border-color 0.15s; line-height: 1.5; }
.choice:hover { background: #f0effe; border-color: #b0aaee; }
.choice.selected { border: 2px solid #7F77DD; background: #EEEDFE; color: #3C3489; }
.next-btn { margin-top: 1rem; width: 100%; padding: 14px; border-radius: 10px; border: none; background: #7F77DD; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; opacity: 0.4; pointer-events: none; transition: opacity 0.2s; }
.next-btn.active { opacity: 1; pointer-events: auto; }
.next-btn.active:hover { background: #6b63cc; }
.tiebreak-notice { font-size: 14px; color: #666; background: #f7f5ff; border-radius: 10px; padding: 0.75rem 1rem; margin-bottom: 1.25rem; line-height: 1.6; border-left: 3px solid #7F77DD; }

/* ── 結果画面：PDFレポート風 ── */
.report-date { font-size: 12px; color: #999; text-align: right; margin-bottom: 6px; }
.report-header { background: linear-gradient(135deg, #fff5f0 0%, #fff9f5 100%); border: 1.5px solid #f5c5a3; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }
.report-header .type-label { font-size: 12px; color: #e07040; font-weight: 600; margin-bottom: 4px; }
.report-header .type-name { font-size: 24px; font-weight: 700; color: #c94a1a; margin-bottom: 6px; }
.report-header .type-catch { font-size: 14px; color: #555; line-height: 1.6; }

.section-bar { color: #fff; font-size: 13px; font-weight: 700; padding: 6px 14px; border-radius: 6px; margin: 14px 0 10px; }
.bar-blue   { background: #4a7fa5; }
.bar-orange { background: #e07040; }
.bar-green  { background: #5a9a6a; }
.bar-purple { background: #8a6ab5; }
.bar-pink   { background: #d4507a; }
.bar-teal   { background: #3a8a8a; }
.bar-gray   { background: #777; }

/* 回答傾向バー */
.stats-wrap { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
.stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.stat-row:last-child { margin-bottom: 0; }
.stat-label { width: 52px; font-size: 13px; font-weight: 600; color: #333; flex-shrink: 0; }
.stat-bar-wrap { flex: 1; height: 13px; background: #f0f0f0; border-radius: 7px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 7px; transition: width 0.8s; }
.fill-d { background: #e85a5a; } .fill-i { background: #f0a030; } .fill-s { background: #50b870; } .fill-c { background: #4a90d9; }
.stat-count { width: 30px; font-size: 13px; color: #666; text-align: right; flex-shrink: 0; }

/* TOP3タグ */
.top3-wrap { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 4px; }
.top3-tag { padding: 7px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; }
.tag-d { background: #fde8e8; color: #c03030; } .tag-i { background: #fef0d8; color: #b06010; }
.tag-s { background: #e8f5ec; color: #2a7a3a; } .tag-c { background: #e0eefa; color: #1a60a0; }

/* 言い換え */
.rephrase-table { width: 100%; border-collapse: collapse; margin: 8px 0; }
.rephrase-table tr { border-bottom: 1px solid #f0f0f0; }
.rephrase-table td { padding: 10px 6px; font-size: 14px; vertical-align: middle; }
.rephrase-bad { color: #555; width: 36%; }
.rephrase-arrow { color: #e07040; font-weight: 700; width: 8%; text-align: center; }
.rephrase-good { color: #1a60a0; font-weight: 600; background: #f0f7ff; border-radius: 6px; padding: 8px 10px !important; }

/* 自分を整える口ぐせ */
.self-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin: 8px 0; }
.self-card { background: #f9f9f9; border-radius: 8px; padding: 12px 10px; text-align: center; }
.self-main { font-size: 13px; font-weight: 700; color: #333; line-height: 1.5; margin-bottom: 5px; }
.self-ex { font-size: 12px; color: #888; }

/* スクリプト */
.script-row { background: #f9f9f9; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
.script-tag { display: inline-block; background: #4a7fa5; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 4px; margin-bottom: 5px; }
.script-main { font-size: 14px; color: #222; font-weight: 600; margin-bottom: 3px; }
.script-ex { font-size: 12px; color: #888; }

/* 実践メニュー */
.practice-list { list-style: none; padding: 0; margin: 8px 0; }
.practice-list li { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; color: #333; display: flex; gap: 8px; }
.practice-list li::before { content: '✓'; color: #e07040; font-weight: 700; flex-shrink: 0; }

/* DISCとは */
.disc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
.disc-card { border-radius: 8px; padding: 12px 14px; }
.disc-d { background: #fde8e8; border: 1px solid #f5c0c0; } .disc-i { background: #fef0d8; border: 1px solid #f5d8a0; }
.disc-s { background: #e8f5ec; border: 1px solid #b0d8b8; } .disc-c { background: #e0eefa; border: 1px solid #a0c8f0; }
.disc-type { font-size: 13px; font-weight: 700; margin-bottom: 3px; color: #333; }
.disc-sub  { font-size: 12px; color: #666; margin-bottom: 5px; }
.disc-ex   { font-size: 12px; color: #444; line-height: 1.7; }

/* プロフィール */
.profile-box { border: 1px solid #eee; border-radius: 10px; padding: 14px 16px; margin: 14px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.profile-name { font-size: 13px; font-weight: 700; color: #e07040; margin-bottom: 4px; }
.profile-desc { font-size: 13px; color: #444; line-height: 1.7; }
.seminar-title { font-size: 13px; font-weight: 700; color: #4a7fa5; margin-bottom: 6px; }
.seminar-desc  { font-size: 13px; color: #444; line-height: 1.7; }
.report-footer { background: #4a7fa5; color: #fff; text-align: center; font-size: 12px; padding: 10px; border-radius: 8px; margin-top: 16px; }
.restart-btn { width: 100%; padding: 13px; border-radius: 10px; border: 1.5px solid #ddd; background: transparent; color: #555; font-size: 15px; cursor: pointer; margin-top: 12px; transition: background 0.15s; }
.restart-btn:hover { background: #f5f5f5; }

@media (max-width: 480px) {
  .self-grid { grid-template-columns: 1fr; }
  .disc-grid  { grid-template-columns: 1fr; }
  .profile-box { grid-template-columns: 1fr; }
}
</style>
</head>

  const max = Math.max(scores.D, scores.I, scores.S, scores.C);
  return Object.keys(scores).filter(t => scores[t] === max);
}

function sortKey(types) { return types.slice().sort().join(""); }

function buildQueue(tied) {
  if (tied.length === 2) return [[tied[0], tied[1]]];
  if (tied.length === 3) {
    const key = sortKey(tied);
    const first = tie3first[key] || [tied[0], tied[1]];
    const rem = tied.find(t => !first.includes(t));
    return [[first[0], first[1]], [null, rem]];
  }
  return [[tied[0], tied[1]]];
}

function render() {
  const app = document.getElementById("app");
  if (phase === "main") renderMain(app);
  else if (phase === "tiebreak") renderTiebreak(app);
  else if (phase === "result") renderResult(app);
}

// ── 通常質問 ──
function renderMain(app) {
  const q = questions[currentQ];
  const pct = Math.round((currentQ / questions.length) * 100);
  app.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="q-num">質問 ${currentQ + 1} / ${questions.length}</div>
    <div class="q-text">${q.text}</div>
    ${q.choices.map((c, i) => `<button class="choice" onclick="selectChoice(${i})">${c.text}</button>`).join("")}
    <button class="next-btn" id="nxt" onclick="nextQ()">${currentQ === questions.length - 1 ? "結果を見る" : "次へ"}</button>
  `;
  selectedChoice = null;
}

function selectChoice(i) {
  selectedChoice = i;
  document.querySelectorAll(".choice").forEach((el, idx) => el.classList.toggle("selected", idx === i));
  const nxt = document.getElementById("nxt");
  nxt.classList.add("active");
  nxt.textContent = currentQ === questions.length - 1 ? "結果を見る" : "次へ";
}

function nextQ() {
  if (selectedChoice === null) return;
  scores[questions[currentQ].choices[selectedChoice].type]++;
  currentQ++;
  selectedChoice = null;
  if (currentQ >= questions.length) {
    const tied = getTiedTypes();
    if (tied.length === 1) { phase = "result"; render(); return; }
    tbQueue = buildQueue(tied);
    tbScores = { D:0, I:0, S:0, C:0 };
    phase = "tiebreak"; render();
  } else { render(); }
}

// ── タイブレーク ──
function renderTiebreak(app) {
  if (tbQueue.length === 0) { phase = "result"; render(); return; }
  const [tA, tB] = tbQueue[0];
  const key = sortKey([tA, tB]);
  const q = tieQ2[key];
  if (!q) { tbQueue.shift(); renderTiebreak(app); return; }
  app.innerHTML = `
    <div class="tiebreak-notice">
      🌸 ${tA}・${tB}タイプが同点です。追加質問に答えてください
    </div>
    <div class="q-text">${q.text}</div>
    ${q.choices.map((c, i) => `<button class="choice" onclick="selectTie(${i},'${c.type}')">${c.text}</button>`).join("")}
  `;
}

function selectTie(i, type) {
  document.querySelectorAll(".choice").forEach((el, idx) => el.classList.toggle("selected", idx === i));
  tbScores[type]++;
  const winner = type;
  tbQueue.shift();
  if (tbQueue.length > 0) {
    if (tbQueue[0][0] === null) tbQueue[0][0] = winner;
    else if (tbQueue[0][1] === null) tbQueue[0][1] = winner;
  }
  setTimeout(() => {
    if (tbQueue.length === 0) {
      // タイブレーク結果をscoresに反映
      Object.keys(tbScores).forEach(t => { scores[t] += tbScores[t]; });
      phase = "result"; render();
    } else { renderTiebreak(document.getElementById("app")); }
  }, 350);
}

// ── 結果画面（PDF風） ──

  const scriptHTML = `

    <div class="disc-grid">
      <div class="disc-card disc-d"><div class="disc-type">D（主導型）</div><div class="disc-sub">行動力・決断力・リーダー気質</div><div class="disc-ex">・「早くやろう！」<br>・「こうすれば絶対うまくいく」</div></div>
      <div class="disc-card disc-i"><div class="disc-type">I（感化型）</div><div class="disc-sub">社交的・楽観的・表現力豊か</div><div class="disc-ex">・「楽しみだね！」<br>・「なんとかなる！」</div></div>
      <div class="disc-card disc-s"><div class="disc-type">S（安定型）</div><div class="disc-sub">協調性・思いやり・穏やか</div><div class="disc-ex">・「大丈夫？」<br>・「いつもありがとう」</div></div>
      <div class="disc-card disc-c"><div class="disc-type">C（慎重型）</div><div class="disc-sub">分析力・正確さ・こだわり強め</div><div class="disc-ex">・「ちゃんと確認しよう」<br>・「段取りが大事」</div></div>
    </div>`;

  const profileHTML = `
    <div class="section-bar bar-gray">講師プロフィール・セミナーのご案内</div>
    <div class="profile-box">
      <div>
        <div class="profile-name">口ぐせセラピスト 大石ゆうじ</div>

  app.innerHTML = `

}

function restart() {
  scores = { D:0, I:0, S:0, C:0 };
  currentQ = 0; phase = "main"; selectedChoice = null; tbQueue = []; tbScores = { D:0, I:0, S:0, C:0 };
  render();
}

render();
